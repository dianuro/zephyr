name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            librsvg2-dev \
            patchelf

      - name: Verify pkg-config
        run: |
          pkg-config --version
          pkg-config --list-all 2>&1 | grep -E "gdk|glib|gtk|cairo|pango|webkit" || echo "---"
          ls -la /usr/lib/x86_64-linux-gnu/pkgconfig/ 2>/dev/null | head -5
          pkg-config --cflags gdk-3.0 2>&1

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Rust fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
