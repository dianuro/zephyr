<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zephyr</title>
    <link id="md-theme-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js" defer></script>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar" class="sidebar hidden">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="files">文件</button>
          <button class="tab-btn" data-tab="outline">大纲</button>
        </div>
        <div id="files-panel" class="sidebar-panel active">
          <div id="file-tree"></div>
        </div>
        <div id="outline-panel" class="sidebar-panel">
          <div id="outline-tree"></div>
        </div>
      </aside>

      <main id="main-content">
        <header id="toolbar">
          <div class="toolbar-left">
            <button id="toggle-sidebar" title="切换侧边栏" class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="4" x2="15" y2="4"/>
                <line x1="3" y1="9" x2="15" y2="9"/>
                <line x1="3" y1="14" x2="15" y2="14"/>
              </svg>
            </button>
            <input type="file" id="file-input" accept=".md,.markdown" style="display:none" />
            <button id="open-file" title="打开文件" class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 5.5A1.5 1.5 0 0 1 3.5 4h4l2 2h5A1.5 1.5 0 0 1 16 7.5v6a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 2 13.5V5.5z"/>
              </svg>
            </button>
          </div>
          <div class="toolbar-title" data-tauri-drag-region>
            <span id="file-title" class="file-title"></span>
          </div>
          <div class="toolbar-right">
            <button id="toggle-search" title="搜索 (Ctrl+F)" class="icon-btn">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="7.5" cy="7.5" r="4.5"/>
                <line x1="11" y1="11" x2="15.5" y2="15.5"/>
              </svg>
            </button>
            <button id="toggle-theme" title="切换主题" class="icon-btn">
              <svg id="theme-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 11.5A6 6 0 0 1 6.5 3.5a6 6 0 1 0 8 8z"/>
              </svg>
            </button>
            <div class="window-controls">
              <button id="win-minimize" class="win-btn" title="最小化">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <line x1="3" y1="7" x2="11" y2="7"/>
                </svg>
              </button>
              <button id="win-maximize" class="win-btn" title="最大化">
                <svg id="win-max-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2.5" y="2.5" width="9" height="9" rx="1"/>
                </svg>
                <svg id="win-restore-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
                  <rect x="3" y="5" width="7" height="7" rx="1"/>
                  <path d="M5 5V3.5a1 1 0 0 1 1-1h4.5a1 1 0 0 1 1 1V8a1 1 0 0 1-1 1H9"/>
                </svg>
              </button>
              <button id="win-close" class="win-btn win-btn-close" title="关闭">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                  <line x1="3" y1="3" x2="11" y2="11"/>
                  <line x1="11" y1="3" x2="3" y2="11"/>
                </svg>
              </button>
            </div>
          </div>
        </header>

        <div id="search-bar" class="search-bar hidden">
          <input type="text" id="search-input" placeholder="在文档中搜索…" />
          <span id="search-count"></span>
          <button id="search-prev" title="上一个" class="icon-btn-sm">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="10.5,9.5 7,5.5 3.5,9.5"/>
            </svg>
          </button>
          <button id="search-next" title="下一个" class="icon-btn-sm">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3.5,4.5 7,8.5 10.5,4.5"/>
            </svg>
          </button>
          <button id="search-close" title="关闭" class="icon-btn-sm">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="2.5" y1="2.5" x2="11.5" y2="11.5"/>
              <line x1="11.5" y1="2.5" x2="2.5" y2="11.5"/>
            </svg>
          </button>
        </div>

        <div id="content" class="markdown-body markdown-body-content"></div>

        <div id="welcome" class="welcome">
          <span class="welcome-text">未打开任何文件</span>
        </div>
      </main>
    </div>
  </body>
</html>
